<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1° Pergunta</title>

     <style>

        body{
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .background{
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("../Images/backgroundMenu.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: blur(5px);
            transform: scale(1.1);
            z-index: -1;
        }

        .card{
            width: 40%;
            padding: 30px;
            margin: auto;
            background: white;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        .title{
            width: 90%;
            margin: auto;
            background: #93FBFF;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }


    </style>
</head>

<body>

    <div class="background"></div>
    <div class="card">
        <div class="title">
            <h1>Meu Card</h1>
        </div>
        <p>Card centralizado na tela</p>
    </div>

</body>
</html>
