<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/geral.css">
    <link rel="stylesheet" href="../CSS/cssPadraoPerguntas.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    
    <title>9° Pergunta</title>
</head>
<body>
    <header>
        <div>
            <a href="TelaInicial.html" class="icons"><i class="fa fa-home" aria-hidden="true"></i></a>
            <p>Tela inicial</p>
        </div>
        <div>
            <a href="TelaInfo.html"><i class="fa fa-user" aria-hidden="true"></i></a>
            <p>Informações do aluno</p>    
        </div>
    </header>

    <div class="background"></div>

    <div class="card">
        <div class="title">
            <h1>Qual o nome do rio que passa pela cidade de Brusque? </h1>
        </div>
        <div class="respostas">
            <img class="image" src="../Images/P9/Rio.png" alt="Rio">
            <div style="display: flex">
                <button class="respostas" onclick="irTela(0)">Rio Nilo</button>
                <button class="respostas" onclick="irTela(0)">Rio Amazonas</button>
                <button class="respostas" onclick="irTela(0)">Rio São Francisco</button>
                <button class="respostas" onclick="irTela(1)">Rio Itajaí Mirim</button>
            </div>
        </div>
    </div>
<script>
    let nota = Number(localStorage.getItem("nota")) || 0;
function irTela(resposta){
    nota += resposta

    localStorage.setItem("nota", nota);
    window.location.href = "10pergunta.html";
}
function mostrarNota(){

    console.log("A nota é: " + nota);

}

mostrarNota();
</script>
</body>
