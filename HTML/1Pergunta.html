<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1° Pergunta</title>

     <style>

        body{
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .background{
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("../Images/backgroundMenu.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: blur(5px);
            transform: scale(1.1);
            z-index: -1;
        }

        .card{
            height: 90%;
            width: 40%;
            padding: 30px;
            margin: auto;
            background: white;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        .title{
            width: 90%;
            margin: auto;
            background: #93FBFF;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

         .image{
            height: 60%;
            width: 60%;
            margin: auto;
        }

        .card-cores{
            width: 10%;
            height: 10%;
            border: 2px solid black;
            border-radius: 15px;
            padding: 10%;
            margin: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="background"></div>
    <div class="card">
        <div class="title">
            <h1>Clique na cor que completa o brasão de Brusque </h1>
        </div>
        <div class="pergunta">
            <img class="image" src="../Images/bandeiraBrusque.png">
            <div style="display: flex">
                <div style="background: rgb(255, 0, 0);" class="card-cores"></div>
                <div style="background: rgb(255, 251, 0);" class="card-cores"></div>
                <div style="background: rgb(25, 0, 255);" class="card-cores"></div>
                <div style="background: rgb(51, 255, 0);" class="card-cores"></div>
            </div>
        </div>
    </div>

</body>
</html>
